name: React Native Expo CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        # Si vous n'avez pas de commande lint définie, vous pouvez la commenter ou supprimer

      - name: Run tests
        run: npm test
        # Assurez-vous d'avoir configuré Jest ou un autre framework de test

      - name: Expo doctor
        run: npx expo-doctor

      - name: Build app preview (Expo)
        run: |
          npx expo install --check
          npx expo prebuild --clean
          npx expo export:web

  e2e-ios:
    runs-on: macos-latest
    # Décommentez si vous voulez exécuter ce job uniquement pour les PR
    # if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build iOS app
        run: npx expo prebuild --platform ios

      # Vous pouvez ajouter des tests e2e ici si vous en avez

  e2e-android:
    runs-on: ubuntu-latest
    # Décommentez si vous voulez exécuter ce job uniquement pour les PR
    # if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Android app
        run: npx expo prebuild --platform android

